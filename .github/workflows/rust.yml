name: Build Claw-Code (Full Cross-Platform)

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output: claw-code-windows-x64
            binary_name: claw-cli
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }} --verbose
        
      - name: Verify Binary Exists
        working-directory: ./rust
        run: |
          $binaryPath = "target/${{ matrix.target }}/release/${{ matrix.binary_name }}${{ matrix.ext }}"
          if (-not (Test-Path $binaryPath)) {
            Write-Error "Binary not found at $binaryPath"
            exit 1
          }
          Write-Host "Binary verified at $binaryPath"
        shell: pwsh
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}${{ matrix.ext }}
          path: |
            rust/target/${{ matrix.target }}/release/${{ matrix.binary_name }}${{ matrix.ext }}
          if-no-files-found: error
