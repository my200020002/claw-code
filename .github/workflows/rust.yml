name: Build Claw-Code (Full Cross-Platform)

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output: claw-code-windows-x64
            binary_name: claw
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: List ALL files in release folder (Windows Debug)
        if: matrix.os == 'windows-latest'
        working-directory: ./rust
        run: |
          echo "Looking in target..."
          dir ./target/
          echo "Looking in target/release..."
          dir ./target/release/
          echo "Looking in target/x86_64-pc-windows-msvc/..."
          dir ./target/x86_64-pc-windows-msvc/ 2>nul || echo "Folder not exists"
          echo "Looking in target/x86_64-pc-windows-msvc/release..."
          dir ./target/x86_64-pc-windows-msvc/release/ 2>nul || echo "Folder not exists"
        shell: pwsh
        
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}${{ matrix.ext }}
          path: |
            rust/target/${{ matrix.target }}/release/${{ matrix.binary_name }}${{ matrix.ext }}
          if-no-files-found: error
